<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RideAI Hubtiger Proxy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }
      #root { min-height: 100vh; }
      .loading-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 1rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #1e293b;
        border-top: 4px solid #4f46e5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #error-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1e293b;
        color: #f87171;
        padding: 2.5rem;
        border-radius: 16px;
        font-family: monospace;
        font-size: 0.875rem;
        display: none;
        z-index: 9999;
        border: 1px solid #ef4444;
        max-width: 90vw;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        text-align: center;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "axios": "https://esm.sh/axios@1.7.9",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.6",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4",
    "dotenv/": "https://esm.sh/dotenv@^17.3.1/"
  }
}
</script>
    <script>
      // Diagnostic Watchdog: Detects if the app fails to mount
      window.addEventListener('DOMContentLoaded', () => {
        const watchdog = setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.querySelector('.spinner')) {
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'block';
            overlay.innerHTML = `
              <div style="font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; color: #fff;">⚠️ Bootstrapping Failed</div>
              <div style="margin-bottom: 10px;">The React application is stuck mounting.</div>
              <div style="background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: left; color: #94a3b8; font-size: 11px;">
                <strong>Likely Cause:</strong> Your import map contained incompatible modules (Node.js modules like express/path) or duplicate React versions. <br><br>
                <strong>Debug Info:</strong><br>
                - Check Console (F12) for specific module resolution errors.<br>
                - Ensure your dependencies are browser-compatible.<br>
                - Try a Hard Refresh (Ctrl+F5).
              </div>
              <button onclick="location.reload()" style="background: #4f46e5; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">Retry Loading</button>
            `;
          }
        }, 5000);

        window.addEventListener('react-ready', () => {
          console.log("🚀 RideAI: Mount signal received. UI is active.");
          clearTimeout(watchdog);
        });
      });

      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'block';
        overlay.innerHTML = `<div style="color:white; font-weight:bold; margin-bottom:10px;">JavaScript Runtime Error</div>
                            <div style="text-align:left; background:#0f172a; padding:10px; border-radius:8px; font-size:11px;">
                              ${msg}<br><br>
                              <small style="color:#64748b">${url}:${lineNo}</small>
                            </div>`;
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loading-state">
        <div class="spinner"></div>
        <div style="color: #64748b; font-size: 0.875rem; font-family: monospace; font-weight: 500;">Initializing RideAI Interface...</div>
      </div>
    </div>
    <div id="error-overlay"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>

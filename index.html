<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RideAI | Hubtiger Proxy Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
      .font-mono { font-family: 'Fira Code', monospace; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }
      #root { min-height: 100vh; }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #1e293b;
        border-top: 3px solid #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #error-display {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 2rem;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "axios": "https://esm.sh/axios@1.7.9",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "express": "https://esm.sh/express@^5.2.1",
    "cors": "https://esm.sh/cors@^2.8.6",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4",
    "dotenv/": "https://esm.sh/dotenv@^17.3.1/"
  }
}
</script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
        <div class="spinner"></div>
        <div style="color: #64748b; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em;">BOOTING RIDEAI INTERFACE...</div>
      </div>
    </div>
    <div id="error-display">
      <div style="background: #1e293b; border: 1px solid #ef4444; padding: 2rem; border-radius: 1rem; max-width: 500px; width: 100%;">
        <h2 style="color: #ef4444; font-weight: 700; margin-bottom: 0.5rem;">Boot Error</h2>
        <p id="error-text" style="color: #94a3b8; font-size: 0.9rem; line-height: 1.5;"></p>
        <button onclick="location.reload()" style="margin-top: 1.5rem; background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;">Retry</button>
      </div>
    </div>
    <script type="module" src="./index.tsx"></script>
    <script>
      window.addEventListener('error', (e) => {
        document.getElementById('error-display').style.display = 'flex';
        document.getElementById('error-text').innerText = e.message;
      });
      window.addEventListener('react-ready', () => {
        console.log("⚛️ React Active");
      });
    </script>
  </body>
</html>
